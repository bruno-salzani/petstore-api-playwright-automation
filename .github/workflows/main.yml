name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [17, 21]
        profile: [fast-checks, regression]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Quality checks (enforcer, spotless, checkstyle, pmd, spotbugs)
        run: |
          mvn -B -DskipTests=true enforcer:enforce
          mvn -B -DskipTests=true com.diffplug.spotless:spotless-maven-plugin:2.43.0:apply
          mvn -B -DskipTests=true verify -DskipITs=true
      - name: Dependency Check (OWASP)
        if: matrix.os == 'ubuntu-latest' && matrix.java == 17 && matrix.profile == 'fast-checks'
        run: mvn -B -DskipTests=true org.owasp:dependency-check-maven:check
      - name: Upload Dependency Check report
        if: always() && matrix.os == 'ubuntu-latest' && matrix.java == 17 && matrix.profile == 'fast-checks'
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
      - name: Run mock tests
        run: mvn -B -Pmock-tests test
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ matrix.os }}-java${{ matrix.java }}-${{ matrix.profile }}
          path: target/surefire-reports
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ matrix.os }}-java${{ matrix.java }}-${{ matrix.profile }}
          path: target/allure-results
      - name: Checkout gh-pages for history
        if: runner.os == 'Linux' && matrix.java == 17 && matrix.profile == 'regression'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1
      - name: Bring Allure history and generate report
        if: runner.os == 'Linux' && matrix.java == 17 && matrix.profile == 'regression'
        run: |
          mkdir -p target/allure-results/history
          cp -r gh-pages/history/* target/allure-results/history/ || true
          mvn -B allure:report
      - name: Upload Allure report (with history)
        if: always() && runner.os == 'Linux' && matrix.java == 17 && matrix.profile == 'regression'
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-with-history
          path: target/allure-report
